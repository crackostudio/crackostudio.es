<script>

const overlays = document.querySelectorAll(".overlay");

/* ---------- FILTRADO ---------- */

document.getElementById("buscar").addEventListener("click", function(){

const categoriaSeleccionada = document.getElementById("categorias").value;
const juegoSeleccionado = document.getElementById("juegos").value;

overlays.forEach(function(overlay){

const categoria = overlay.getAttribute("data-category");
const juego = overlay.getAttribute("data-game");

if(
(categoriaSeleccionada === "all" || categoria === categoriaSeleccionada) &&
(juegoSeleccionado === "all" || juego === juegoSeleccionado)
){
overlay.style.display = "block";
}
else{
overlay.style.display = "none";
}

});

});

/* ---------- OVERLAYS EXPANDIBLES ---------- */

overlays.forEach(overlay => {

overlay.addEventListener("click", function () {

overlays.forEach(o => {

if (o !== overlay) {

o.classList.remove("expandido");

const btn = o.querySelector(".cerrar");
if (btn) btn.remove();

const desc = o.querySelector(".descripcion-overlay");
if (desc) desc.remove();

const comprar = o.querySelector(".comprar-btn");
if (comprar) comprar.remove();

}

});

if (overlay.classList.contains("expandido")) return;

overlay.classList.add("expandido");

const cerrarBtn = document.createElement("div");
cerrarBtn.classList.add("cerrar");
cerrarBtn.textContent = "✖";
overlay.appendChild(cerrarBtn);

const descripcion = document.createElement("div");
descripcion.classList.add("descripcion-overlay");
descripcion.textContent = overlay.getAttribute("data-descripcion");
overlay.appendChild(descripcion);

const comprarBtn = document.createElement("button");
comprarBtn.classList.add("comprar-btn");
comprarBtn.textContent = "Comprar";
overlay.appendChild(comprarBtn);

comprarBtn.addEventListener("click", function(e){

e.stopPropagation();

const url = overlay.getAttribute("data-comprar");

window.open(url, "_blank");

});

cerrarBtn.addEventListener("click", function(e){

e.stopPropagation();

overlay.classList.remove("expandido");
cerrarBtn.remove();
descripcion.remove();
comprarBtn.remove();

});

});

});

</script>
